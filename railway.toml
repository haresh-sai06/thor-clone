[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'cd /app && echo \"Starting THOR Backend...\" && echo \"PORT: $PORT\" && echo \"Working directory:\" && pwd && echo \"Files in directory:\" && ls -la && sleep 2 && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level debug'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "web"

[services.variables]
PORT = "8000"
