[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "sh -c 'echo \"Starting THOR Backend...\" && echo \"PORT: $PORT\" && sleep 2 && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level debug'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "web"

[services.variables]
PORT = "8000"
